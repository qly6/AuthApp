apiVersion: v2
name: simpleauth
description: Umbrella chart for SimpleAuth application (API + UI + PostgreSQL)
type: application
version: 0.2.0
appVersion: "1.0.0"

dependencies:
  - name: api
    version: 0.1.0
    repository: "file://charts/api"
  - name: ui
    version: 0.1.0
    repository: "file://charts/ui"
  - name: postgresql
    version: 15.5.20
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
