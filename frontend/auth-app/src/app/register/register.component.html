<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

  <!-- Email -->
  <div>
    <label for="email">Email</label>
    <input id="email" type="email" formControlName="email" />

    <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
      <small *ngIf="registerForm.get('email')?.errors?.['required']">
        Email is required
      </small>

      <small *ngIf="registerForm.get('email')?.errors?.['email']">
        Enter a valid email
      </small>
    </div>
  </div>

  <!-- Password -->
  <div>
    <label for="password">Password</label>
    <input id="password" type="password" formControlName="password" />

    <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
      <small *ngIf="registerForm.get('password')?.errors?.['required']">
        Password is required
      </small>

      <small *ngIf="registerForm.get('password')?.errors?.['minlength']">
        Password must be at least 6 characters
      </small>
    </div>
  </div>

  <!-- Confirm Password -->
  <div>
    <label for="confirmPassword">Confirm Password</label>
    <input id="confirmPassword" type="password" formControlName="confirmPassword" />

    <div *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.get('confirmPassword')?.invalid">
      <small *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">
        Confirm password is required
      </small>
    </div>
  </div>

  <!-- Password mismatch error -->
  <div *ngIf="registerForm.errors?.['mismatch']">
    <small style="color: red;">
      Passwords do not match
    </small>
  </div>

  <!-- Success message -->
  <div *ngIf="successMessage" style="color: green;">
    {{ successMessage }}
  </div>

  <!-- Error message -->
  <div *ngIf="errorMessage" style="color: red;">
    {{ errorMessage }}
  </div>

  <!-- Submit button -->
  <button
    type="submit"
    [disabled]="registerForm.invalid || loading"
  >
    {{ loading ? 'Creating account...' : 'Register' }}
  </button>

</form>
