name: Build and Deploy to EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  API_REPO: quyen-simpleauth-api
  UI_REPO: quyen-simpleauth-ui
  K8S_NAMESPACE: simpleauth
  HELM_RELEASE: simpleauth
  EKS_CLUSTER: retail-vti-do2508-de000159-quyen-eksdemo
  POSTGRES_REGISTRY: docker.io
  POSTGRES_REPOSITORY: bitnamilegacy/postgresql
  POSTGRES_TAG: 16.2.0

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_tag: ${{ steps.api_meta.outputs.version }}
      ui_tag: ${{ steps.ui_meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsEKSRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- API Image ----------
      - name: API Docker metadata
        id: api_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ECR_REGISTRY }}/${{ env.API_REPO }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/SimpleAuthApi/SimpleAuthApi
          push: true
          tags: ${{ steps.api_meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- UI Image ----------
      - name: UI Docker metadata
        id: ui_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ECR_REGISTRY }}/${{ env.UI_REPO }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/SimpleAuthUi
          push: true
          tags: ${{ steps.ui_meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsEKSRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Deploy with Helm
        run: |
          cd infrastructure/helm/simpleauth-chart
          helm dependency update

          API_TAG="${{ needs.build-and-push.outputs.api_tag }}"
          UI_TAG="${{ needs.build-and-push.outputs.ui_tag }}"

          # Fallback nếu tag không được tạo
          [ -z "$API_TAG" ] && API_TAG="latest"
          [ -z "$UI_TAG" ] && UI_TAG="latest"

          echo "🚀 Deploying API tag: $API_TAG, UI tag: $UI_TAG"

          helm upgrade --install "${{ env.HELM_RELEASE }}" . \
              --namespace "${{ env.K8S_NAMESPACE }}" \
              --create-namespace \
              --set api.image.tag="${API_TAG}" \
              --set ui.image.tag="${UI_TAG}" \
              --set-string api.jwtSecret="${{ secrets.JWT_SECRET }}" \
              --set-string api.database.password="${{ secrets.DB_PASSWORD }}" \
              --set-string postgresql.auth.password="${{ secrets.DB_PASSWORD }}" \
              --set postgresql.image.registry=${{ env.POSTGRES_REGISTRY }} \
              --set postgresql.image.repository=${{ env.POSTGRES_REPOSITORY }} \
              --set postgresql.image.tag=${{ env.POSTGRES_TAG }}

      - name: Verify deployment
        run: |
          echo "📡 Checking pod status..."
          kubectl -n ${{ env.K8S_NAMESPACE }} get pods
          echo "🌐 Ingress address:"
          kubectl -n ${{ env.K8S_NAMESPACE }} get ingress