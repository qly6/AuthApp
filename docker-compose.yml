version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-authuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe123!}
      POSTGRES_DB: ${POSTGRES_DB:-authdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-authuser} -d ${POSTGRES_DB:-authdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-network

  backend:
    build:
      context: ./backend   # Path to solution root (contains AuthApp.sln and Dockerfile)
      dockerfile: Dockerfile
    container_name: auth-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=${POSTGRES_DB:-authdb};Username=${POSTGRES_USER:-authuser};Password=${POSTGRES_PASSWORD:-ChangeMe123!}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Fido__Domain=${FIDO_DOMAIN}
      - Fido__Origin=${FIDO_ORIGIN} 
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - auth-network

  # frontend:
  #   build:
  #     context: ./frontend/auth-app   # Path to Angular project (contains Dockerfile and nginx.conf)
  #     dockerfile: Dockerfile
  #   container_name: auth-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "4201:80"
  #   environment:
  #     API_URL: https://api.staging.example.com
  #     FEATURE_FLAG: "true"
  #   # depends_on:
  #   #   - backend
    # networks:
    #   - auth-network

  frontend2:
    build:
      context: ./project-name   # Path to Angular project (contains Dockerfile and nginx.conf)
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      API_URL: https://backend:8080/api
    depends_on:
      - backend
    networks:
      - auth-network

volumes:
  postgres_data:
    driver: local

networks:
  auth-network:
    driver: bridge