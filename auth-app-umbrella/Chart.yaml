apiVersion: v2
name: auth-app-umbrella
description: Umbrella chart for Auth application with Postgres, Backend, Frontend
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: db
    version: "0.1.0"
    repository: "file://charts/db"
    condition: db.enabled
  - name: backend
    version: "0.1.0"
    repository: "file://charts/backend"
    condition: backend.enabled
  - name: frontend
    version: "0.1.0"
    repository: "file://charts/frontend"
    condition: frontend.enabled