<nav class="navbar" *ngIf="(authService.currentUser$ | async) as user; else guestNav">
  <div class="nav-brand">AuthApp</div>
  <div class="nav-links">
    <span class="user-email">{{ user.email }}</span>
    <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a routerLink="/passkeys" routerLinkActive="active">Passkeys</a>
    <a *ngIf="!user.mfaEnabled" routerLink="/mfa-setup" routerLinkActive="active">Setup MFA</a>
    <button class="logout-btn" (click)="authService.logout()">Logout</button>
  </div>
</nav>

<ng-template #guestNav>
  <nav class="navbar guest">
    <div class="nav-brand">AuthApp</div>
    <div class="nav-links">
      <a routerLink="/login" routerLinkActive="active">Login</a>
      <a routerLink="/register" routerLinkActive="active">Register</a>
    </div>
  </nav>
</ng-template>

<main class="main-content">
  <router-outlet></router-outlet>
</main>
